<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Blend Builder</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Comic Sans MS','Chalkboard SE','Arial Rounded MT Bold',sans-serif;
      background:linear-gradient(135deg,#e0e7ff 0%,#818cf8 50%,#3730a3 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 30px}
    .top-bar{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .back-link{background:rgba(255,255,255,.85);border:none;border-radius:20px;padding:6px 14px;
      font-family:inherit;font-size:.85rem;font-weight:bold;color:#3730a3;cursor:pointer;text-decoration:none}
    .score-badge{background:rgba(255,255,255,.88);border-radius:14px;padding:6px 16px;
      font-size:.88rem;font-weight:bold;color:#555}
    .score-badge span{color:#4f46e5;font-size:1.05rem}
    h1{font-size:1.55rem;color:#fff;text-shadow:2px 2px 0 #1e1b4b;margin-bottom:4px;text-align:center}
    .subtitle{color:rgba(255,255,255,.9);font-size:.82rem;margin-bottom:10px;text-align:center;min-height:1.2em}
    .progress-wrap{width:100%;max-width:560px;margin-bottom:12px}
    .progress-track{height:9px;background:rgba(255,255,255,.35);border-radius:5px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#c7d2fe,#4f46e5);border-radius:5px;transition:width .4s ease;width:0%}
    .progress-label{font-size:.7rem;color:rgba(255,255,255,.85);text-align:right;margin-top:2px}
    .card{background:rgba(255,255,255,.97);border-radius:22px;padding:22px 18px 20px;
      box-shadow:0 8px 30px rgba(0,0,0,.13);width:100%;max-width:560px}

    /* Difficulty picker */
    #pickScreen{text-align:center}
    .pick-heading{font-size:1.1rem;font-weight:bold;color:#3730a3;margin-bottom:18px}
    .pick-btns{display:flex;flex-direction:column;gap:12px}
    .pick-btn{border:none;border-radius:16px;padding:16px 18px;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;gap:14px;text-align:left;transition:transform .12s ease}
    .pick-btn:hover{transform:translateY(-2px)}
    .pick-btn:active{transform:translateY(2px)}
    .pick-icon{font-size:1.8rem;line-height:1;flex-shrink:0}
    .pick-info{flex:1}
    .pick-name{font-size:1.05rem;font-weight:bold;display:block;margin-bottom:2px}
    .pick-desc{font-size:.75rem;opacity:.8;display:block}
    .btn-easy{background:linear-gradient(135deg,#d1fae5,#6ee7b7);color:#065f46;box-shadow:0 5px 0 #047857}
    .btn-medium{background:linear-gradient(135deg,#e0e7ff,#a5b4fc);color:#1e1b4b;box-shadow:0 5px 0 #3730a3}
    .btn-hard{background:linear-gradient(135deg,#fce7f3,#f9a8d4);color:#831843;box-shadow:0 5px 0 #be185d}

    /* Question */
    .prompt{text-align:center;font-size:.8rem;font-weight:bold;color:#4f46e5;
      text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .stimulus{text-align:center;margin-bottom:20px}
    .stim-emoji{font-size:4.5rem;display:block;line-height:1;margin-bottom:10px}
    .rime-display{display:inline-flex;align-items:center;gap:4px;font-size:2.4rem;
      font-weight:bold;color:#1e1b4b;letter-spacing:2px}
    .rime-blank{display:inline-block;min-width:52px;border-bottom:4px solid #4f46e5;
      color:#4f46e5;text-align:center;transition:all .3s ease;padding:0 4px}
    .rime-blank.filled{border-color:#16a34a;color:#16a34a}

    .onset-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .onset-btn{border-radius:14px;border:3px solid transparent;cursor:pointer;font-family:inherit;
      background:linear-gradient(135deg,#4f46e5,#3730a3);color:#fff;
      box-shadow:0 5px 0 #1e1b4b;transition:all .15s ease;padding:18px 10px;text-align:center;
      font-size:1.5rem;font-weight:bold;letter-spacing:2px}
    .onset-btn:hover{transform:translateY(-2px)}
    .onset-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #1e1b4b}
    .onset-btn.correct{background:linear-gradient(135deg,#16a34a,#15803d)!important;box-shadow:0 5px 0 #14532d!important;cursor:default}
    .onset-btn.wrong{background:linear-gradient(135deg,#dc2626,#b91c1c)!important;box-shadow:0 5px 0 #7f1d1d!important;cursor:default}
    .onset-btn:disabled{cursor:default}

    .fusion-msg{text-align:center;font-size:1.5rem;font-weight:bold;color:#16a34a;
      min-height:2em;margin-bottom:6px;transition:opacity .3s}
    .status-msg{min-height:24px;text-align:center;font-size:.92rem;font-weight:bold;color:#4f46e5;margin-bottom:12px}
    .btn-next-wrap{text-align:center}
    .btn-next{background:linear-gradient(135deg,#4f46e5,#3730a3);color:#fff;border:none;
      border-radius:14px;padding:12px 30px;font-family:inherit;font-size:1rem;font-weight:bold;
      cursor:pointer;box-shadow:0 5px 0 #1e1b4b;transition:all .15s ease;display:none}
    .btn-next:hover{transform:translateY(-2px)}
    .btn-next:active{transform:translateY(3px);box-shadow:0 2px 0 #1e1b4b}

    /* Animation */
    @keyframes popIn{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
    .pop{animation:popIn .35s ease forwards}

    /* Done screen */
    .done-screen{display:none;text-align:center}
    .done-emoji{font-size:4.5rem;display:block;margin-bottom:14px}
    .done-title{font-size:2rem;color:#3730a3;font-weight:bold;margin-bottom:8px}
    .done-score{font-size:1.1rem;color:#555;margin-bottom:6px}
    .done-level{font-size:.82rem;color:#6b7280;margin-bottom:20px}
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
    .confetti-piece{position:absolute;top:-20px;border-radius:2px;opacity:.85;animation:fall linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
  </style>
</head>
<body>
<div class="top-bar">
  <a class="back-link" href="../launcher.html">← All Games</a>
  <div class="score-badge">🧱 <span id="score">0</span> pts</div>
</div>
<h1>🧱 Blend Builder</h1>
<p class="subtitle" id="subtitle">Pick the sound that starts the word!</p>
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<!-- Difficulty picker -->
<div class="card" id="pickScreen">
  <div class="pick-heading">Choose your level</div>
  <div class="pick-btns">
    <button class="pick-btn btn-easy" onclick="startGame('easy')">
      <span class="pick-icon">⭐</span>
      <span class="pick-info">
        <span class="pick-name">Easy</span>
        <span class="pick-desc">Single-letter onsets: C+AT, H+OP, B+UN…</span>
      </span>
    </button>
    <button class="pick-btn btn-medium" onclick="startGame('medium')">
      <span class="pick-icon">⭐⭐</span>
      <span class="pick-info">
        <span class="pick-name">Medium</span>
        <span class="pick-desc">Digraphs: SH+INE, SN+AKE, CH+…</span>
      </span>
    </button>
    <button class="pick-btn btn-hard" onclick="startGame('hard')">
      <span class="pick-icon">⭐⭐⭐</span>
      <span class="pick-info">
        <span class="pick-name">Hard</span>
        <span class="pick-desc">Blends: FR+OG, TR+AIN, FL+IGHT…</span>
      </span>
    </button>
  </div>
</div>

<!-- Game card -->
<div class="card" id="gameCard" style="display:none">
  <div class="prompt">Pick the start sound 🔤</div>
  <div class="stimulus">
    <span class="stim-emoji" id="stimEmoji"></span>
    <div class="rime-display">
      <span class="rime-blank" id="rimeBlank"></span>
      <span id="rimeText"></span>
    </div>
  </div>
  <div class="onset-grid" id="onsetGrid"></div>
  <div class="fusion-msg" id="fusionMsg"></div>
  <div class="status-msg" id="statusMsg"></div>
  <div class="btn-next-wrap">
    <button class="btn-next" id="btnNext" onclick="nextQ()">Next ➡</button>
  </div>
</div>

<!-- Done screen -->
<div class="card done-screen" id="doneScreen">
  <span class="done-emoji">🎉</span>
  <div class="done-title" id="doneTitle">Amazing!</div>
  <div class="done-score" id="doneScore"></div>
  <div class="done-level" id="doneLevel"></div>
  <button class="btn-next" style="display:inline-block" onclick="restart()">Play Again 🔄</button>
  <br><a class="back-link" style="margin-top:14px;display:inline-block" href="../launcher.html">← All Games</a>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="../data/blend-builder.js"></script>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function getAC(){if(!ac&&AC)ac=new AC();return ac;}
function playTone(f,t,d,v=.18,del=0){try{const ctx=getAC();if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.value=f;const s=ctx.currentTime+del;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d);}catch(e){}}
function soundCorrect(){playTone(523,'sine',.1,.2);playTone(659,'sine',.1,.18,.1);playTone(784,'sine',.12,.18,.2);}
function soundWrong(){playTone(200,'sawtooth',.3,.12);}
function soundWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.25,.2,i*.12));}
function confetti(){const w=document.getElementById('confettiWrap');w.innerHTML='';const cols=['#4f46e5','#818cf8','#16a34a','#f59e0b','#e11d48'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;background:${cols[0|Math.random()*cols.length]};animation-duration:${1.2+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px`;w.appendChild(p);}setTimeout(()=>w.innerHTML='',2200);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}

const SETTINGS={
  easy:  {tiers:[1],     limit:15, label:'⭐ Easy'},
  medium:{tiers:[1,2],   limit:20, label:'⭐⭐ Medium'},
  hard:  {tiers:[1,2,3], limit:25, label:'⭐⭐⭐ Hard'},
};

let difficulty='easy',questions=[],qi=0,score=0;

function startGame(diff){
  difficulty=diff;
  const s=SETTINGS[diff];
  const pool=window.BLEND_BUILDER.filter(q=>s.tiers.includes(q.tier??1));
  questions=shuffle(pool).slice(0,s.limit);
  qi=0;score=0;
  document.getElementById('score').textContent='0';
  document.getElementById('pickScreen').style.display='none';
  document.getElementById('gameCard').style.display='block';
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('subtitle').textContent=`${s.label} — Build the word!`;
  showQ();
}

function showQ(){
  const q=questions[qi];
  document.getElementById('progressFill').style.width=Math.round(qi/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent=`Word ${qi+1} of ${questions.length}`;
  document.getElementById('stimEmoji').textContent=q.emoji;
  document.getElementById('rimeBlank').textContent='___';
  document.getElementById('rimeBlank').classList.remove('filled');
  document.getElementById('rimeText').textContent=q.rime;
  document.getElementById('fusionMsg').textContent='';
  document.getElementById('statusMsg').textContent='';
  document.getElementById('btnNext').style.display='none';

  const opts=shuffle([q.onset,...q.wrong]);
  const grid=document.getElementById('onsetGrid');
  grid.innerHTML='';
  opts.forEach(onset=>{
    const btn=document.createElement('button');
    btn.className='onset-btn';
    btn.textContent=onset;
    btn.onclick=()=>choose(btn,onset,q);
    grid.appendChild(btn);
  });
}

function choose(btn,onset,q){
  document.querySelectorAll('.onset-btn').forEach(b=>b.disabled=true);
  const correct=onset===q.onset;
  if(correct){
    btn.classList.add('correct');
    const blank=document.getElementById('rimeBlank');
    blank.textContent=onset;
    blank.classList.add('filled','pop');
    score+=10;
    document.getElementById('score').textContent=score;
    setTimeout(()=>{
      const fm=document.getElementById('fusionMsg');
      fm.textContent=`${onset} + ${q.rime} = ${q.word}! 🎉`;
      fm.classList.add('pop');
    },300);
    document.getElementById('statusMsg').textContent='';
    soundCorrect();
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.onset-btn').forEach(b=>{
      if(b.textContent===q.onset)b.classList.add('correct');
    });
    document.getElementById('statusMsg').textContent=`❌ It's ${q.onset} + ${q.rime} = ${q.word}`;
    soundWrong();
  }
  setTimeout(()=>document.getElementById('btnNext').style.display='inline-block',900);
}

function nextQ(){qi++;if(qi>=questions.length)showDone();else showQ();}

function showDone(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='block';
  document.getElementById('progressFill').style.width='100%';
  const total=questions.length;
  const pct=Math.round(score/total/10*100);
  document.getElementById('doneScore').textContent=`You scored ${score} out of ${total*10} points (${pct}%)!`;
  document.getElementById('doneLevel').textContent=`Level: ${SETTINGS[difficulty].label}`;
  const title=pct>=90?'Amazing! 🌟':pct>=70?'Brilliant! 🎉':pct>=50?'Good job! 👍':'Keep practising! 💪';
  document.getElementById('doneTitle').textContent=title;
  soundWin();confetti();
}

function restart(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('pickScreen').style.display='block';
  document.getElementById('subtitle').textContent='Pick the sound that starts the word!';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressLabel').textContent='';
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("../sw.js",{scope:"../"}).catch(()=>{});</script>
</body>
</html>
