<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vowel Volcano</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Comic Sans MS','Chalkboard SE','Arial Rounded MT Bold',sans-serif;
      background:linear-gradient(135deg,#fef2f2 0%,#f87171 50%,#b91c1c 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 30px}
    .top-bar{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .back-link{background:rgba(255,255,255,.85);border:none;border-radius:20px;padding:6px 14px;
      font-family:inherit;font-size:.85rem;font-weight:bold;color:#991b1b;cursor:pointer;text-decoration:none}
    .score-badge{background:rgba(255,255,255,.88);border-radius:14px;padding:6px 16px;
      font-size:.88rem;font-weight:bold;color:#555}
    .score-badge span{color:#dc2626;font-size:1.05rem}
    h1{font-size:1.55rem;color:#fff;text-shadow:2px 2px 0 #7f1d1d;margin-bottom:4px;text-align:center}
    .subtitle{color:rgba(255,255,255,.9);font-size:.82rem;margin-bottom:10px;text-align:center;min-height:1.2em}
    .progress-wrap{width:100%;max-width:560px;margin-bottom:12px}
    .progress-track{height:9px;background:rgba(255,255,255,.35);border-radius:5px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#fca5a5,#dc2626);border-radius:5px;transition:width .4s ease;width:0%}
    .progress-label{font-size:.7rem;color:rgba(255,255,255,.85);text-align:right;margin-top:2px}
    .card{background:rgba(255,255,255,.97);border-radius:22px;padding:22px 18px 20px;
      box-shadow:0 8px 30px rgba(0,0,0,.13);width:100%;max-width:560px}

    /* Difficulty picker */
    #pickScreen{text-align:center}
    .pick-heading{font-size:1.1rem;font-weight:bold;color:#991b1b;margin-bottom:18px}
    .pick-btns{display:flex;flex-direction:column;gap:12px}
    .pick-btn{border:none;border-radius:16px;padding:16px 18px;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;gap:14px;text-align:left;transition:transform .12s ease}
    .pick-btn:hover{transform:translateY(-2px)}
    .pick-btn:active{transform:translateY(2px)}
    .pick-icon{font-size:1.8rem;line-height:1;flex-shrink:0}
    .pick-info{flex:1}
    .pick-name{font-size:1.05rem;font-weight:bold;display:block;margin-bottom:2px}
    .pick-desc{font-size:.75rem;opacity:.8;display:block}
    .btn-easy{background:linear-gradient(135deg,#d1fae5,#6ee7b7);color:#065f46;box-shadow:0 5px 0 #047857}
    .btn-medium{background:linear-gradient(135deg,#fee2e2,#fca5a5);color:#7f1d1d;box-shadow:0 5px 0 #991b1b}
    .btn-hard{background:linear-gradient(135deg,#fce7f3,#f9a8d4);color:#831843;box-shadow:0 5px 0 #be185d}

    /* Question */
    .prompt{text-align:center;font-size:.8rem;font-weight:bold;color:#dc2626;
      text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .stimulus{text-align:center;margin-bottom:18px}
    .stim-emoji{font-size:4.5rem;display:block;line-height:1;margin-bottom:8px}
    .stim-word{font-size:2.2rem;font-weight:bold;color:#1f2937;letter-spacing:4px}

    /* Volcano buckets */
    .volcanoes{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .volcano-btn{border:none;border-radius:16px;cursor:pointer;font-family:inherit;
      padding:14px 10px 10px;min-width:60px;text-align:center;
      transition:all .15s ease;position:relative}
    .volcano-btn:hover{transform:translateY(-3px)}
    .volcano-btn:active{transform:translateY(3px)}
    .volcano-btn:disabled{cursor:default}
    .v-vowel{font-size:1.4rem;font-weight:bold;display:block;color:#fff;line-height:1;margin-bottom:4px}
    .v-label{font-size:.6rem;color:rgba(255,255,255,.85);display:block;text-transform:uppercase;letter-spacing:.5px}
    .v-lava{font-size:1.5rem;display:block;line-height:1}

    .vbtn-a{background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 5px 0 #9a3412}
    .vbtn-e{background:linear-gradient(135deg,#eab308,#ca8a04);box-shadow:0 5px 0 #713f12}
    .vbtn-i{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 5px 0 #14532d}
    .vbtn-o{background:linear-gradient(135deg,#3b82f6,#2563eb);box-shadow:0 5px 0 #1e3a8a}
    .vbtn-u{background:linear-gradient(135deg,#a855f7,#7c3aed);box-shadow:0 5px 0 #4c1d95}

    .volcano-btn.correct{border:4px solid #22c55e!important;animation:erupt .5s ease}
    .volcano-btn.wrong{animation:shake .4s ease}
    @keyframes erupt{0%{transform:scale(1)}30%{transform:scale(1.2) translateY(-6px)}60%{transform:scale(.95)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}

    .status-msg{min-height:26px;text-align:center;font-size:.92rem;font-weight:bold;color:#dc2626;margin-bottom:12px}
    .btn-next-wrap{text-align:center}
    .btn-next{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;
      border-radius:14px;padding:12px 30px;font-family:inherit;font-size:1rem;font-weight:bold;
      cursor:pointer;box-shadow:0 5px 0 #7f1d1d;transition:all .15s ease;display:none}
    .btn-next:hover{transform:translateY(-2px)}
    .btn-next:active{transform:translateY(3px);box-shadow:0 2px 0 #7f1d1d}

    /* Done screen */
    .done-screen{display:none;text-align:center}
    .done-emoji{font-size:4.5rem;display:block;margin-bottom:14px}
    .done-title{font-size:2rem;color:#991b1b;font-weight:bold;margin-bottom:8px}
    .done-score{font-size:1.1rem;color:#555;margin-bottom:6px}
    .done-level{font-size:.82rem;color:#6b7280;margin-bottom:20px}
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
    .confetti-piece{position:absolute;top:-20px;border-radius:2px;opacity:.85;animation:fall linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
  </style>
</head>
<body>
<div class="top-bar">
  <a class="back-link" href="../launcher.html">← All Games</a>
  <div class="score-badge">🌋 <span id="score">0</span> pts</div>
</div>
<h1>🌋 Vowel Volcano</h1>
<p class="subtitle" id="subtitle">Drop the word into the right vowel volcano!</p>
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div class="card" id="pickScreen">
  <div class="pick-heading">Choose your level</div>
  <div class="pick-btns">
    <button class="pick-btn btn-easy" onclick="startGame('easy')">
      <span class="pick-icon">⭐</span>
      <span class="pick-info">
        <span class="pick-name">Easy</span>
        <span class="pick-desc">3 volcanoes: short A, I, and O</span>
      </span>
    </button>
    <button class="pick-btn btn-medium" onclick="startGame('medium')">
      <span class="pick-icon">⭐⭐</span>
      <span class="pick-info">
        <span class="pick-name">Medium</span>
        <span class="pick-desc">All 5 volcanoes: A, E, I, O, U</span>
      </span>
    </button>
    <button class="pick-btn btn-hard" onclick="startGame('hard')">
      <span class="pick-icon">⭐⭐⭐</span>
      <span class="pick-info">
        <span class="pick-name">Hard</span>
        <span class="pick-desc">Tricky blends — find the hidden vowel</span>
      </span>
    </button>
  </div>
</div>

<div class="card" id="gameCard" style="display:none">
  <div class="prompt">🌋 Which vowel is in this word?</div>
  <div class="stimulus">
    <span class="stim-emoji" id="stimEmoji"></span>
    <div class="stim-word" id="stimWord"></div>
  </div>
  <div class="volcanoes" id="volcanoes"></div>
  <div class="status-msg" id="statusMsg"></div>
  <div class="btn-next-wrap">
    <button class="btn-next" id="btnNext" onclick="nextQ()">Next ➡</button>
  </div>
</div>

<div class="card done-screen" id="doneScreen">
  <span class="done-emoji">🌋</span>
  <div class="done-title" id="doneTitle">Amazing!</div>
  <div class="done-score" id="doneScore"></div>
  <div class="done-level" id="doneLevel"></div>
  <button class="btn-next" style="display:inline-block" onclick="restart()">Play Again 🔄</button>
  <br><a class="back-link" style="margin-top:14px;display:inline-block" href="../launcher.html">← All Games</a>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="../data/vowel-volcano.js"></script>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function getAC(){if(!ac&&AC)ac=new AC();return ac;}
function playTone(f,t,d,v=.18,del=0){try{const ctx=getAC();if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.value=f;const s=ctx.currentTime+del;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d);}catch(e){}}
function soundCorrect(){playTone(880,'sine',.15,.2);playTone(1100,'sine',.15,.18,.1);}
function soundWrong(){playTone(200,'sawtooth',.3,.12);}
function soundWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.25,.2,i*.12));}
function confetti(){const w=document.getElementById('confettiWrap');w.innerHTML='';const cols=['#dc2626','#f97316','#eab308','#22c55e','#3b82f6','#a855f7'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;background:${cols[0|Math.random()*cols.length]};animation-duration:${1.2+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px`;w.appendChild(p);}setTimeout(()=>w.innerHTML='',2200);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}

const SETTINGS={
  easy:  {tiers:[1],     limit:15, vowels:['A','I','O'],     label:'⭐ Easy'},
  medium:{tiers:[1,2],   limit:20, vowels:['A','E','I','O','U'], label:'⭐⭐ Medium'},
  hard:  {tiers:[1,2,3], limit:25, vowels:['A','E','I','O','U'], label:'⭐⭐⭐ Hard'},
};

const V_STYLE={A:'vbtn-a',E:'vbtn-e',I:'vbtn-i',O:'vbtn-o',U:'vbtn-u'};
const V_LAVA ={A:'🔥',E:'💛',I:'💚',O:'💙',U:'💜'};
const V_NAME ={A:'short A',E:'short E',I:'short I',O:'short O',U:'short U'};

let difficulty='easy',questions=[],qi=0,score=0,activeVowels=[];

function startGame(diff){
  difficulty=diff;
  const s=SETTINGS[diff];
  activeVowels=s.vowels;
  const pool=window.VOWEL_VOLCANO.filter(q=>s.tiers.includes(q.tier??1)&&s.vowels.includes(q.vowel));
  questions=shuffle(pool).slice(0,s.limit);
  qi=0;score=0;
  document.getElementById('score').textContent='0';
  document.getElementById('pickScreen').style.display='none';
  document.getElementById('gameCard').style.display='block';
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('subtitle').textContent=`${s.label} — Sort by vowel!`;
  buildVolcanoes();
  showQ();
}

function buildVolcanoes(){
  const el=document.getElementById('volcanoes');
  el.innerHTML='';
  activeVowels.forEach(v=>{
    const btn=document.createElement('button');
    btn.className=`volcano-btn ${V_STYLE[v]}`;
    btn.id=`vol-${v}`;
    btn.innerHTML=`<span class="v-vowel">${v}</span><span class="v-label">${V_NAME[v]}</span><span class="v-lava">${V_LAVA[v]}</span>`;
    btn.onclick=()=>choose(btn,v);
    el.appendChild(btn);
  });
}

function showQ(){
  const q=questions[qi];
  document.getElementById('progressFill').style.width=Math.round(qi/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent=`Word ${qi+1} of ${questions.length}`;
  document.getElementById('stimEmoji').textContent=q.emoji;
  document.getElementById('stimWord').textContent=q.word;
  document.getElementById('statusMsg').textContent='';
  document.getElementById('btnNext').style.display='none';
  document.querySelectorAll('.volcano-btn').forEach(b=>{
    b.disabled=false;b.classList.remove('correct','wrong');
  });
}

function choose(btn,vowel){
  document.querySelectorAll('.volcano-btn').forEach(b=>b.disabled=true);
  const q=questions[qi];
  const correct=vowel===q.vowel;
  if(correct){
    btn.classList.add('correct');
    score+=10;
    document.getElementById('score').textContent=score;
    document.getElementById('statusMsg').textContent=`✅ ${q.word} has the short ${q.vowel} sound!`;
    soundCorrect();
  }else{
    btn.classList.add('wrong');
    document.getElementById(`vol-${q.vowel}`).classList.add('correct');
    document.getElementById('statusMsg').textContent=`❌ The vowel in ${q.word} is ${q.vowel}!`;
    soundWrong();
  }
  setTimeout(()=>document.getElementById('btnNext').style.display='inline-block',900);
}

function nextQ(){qi++;if(qi>=questions.length)showDone();else showQ();}

function showDone(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='block';
  document.getElementById('progressFill').style.width='100%';
  const total=questions.length,pct=Math.round(score/total/10*100);
  document.getElementById('doneScore').textContent=`You scored ${score} out of ${total*10} points (${pct}%)!`;
  document.getElementById('doneLevel').textContent=`Level: ${SETTINGS[difficulty].label}`;
  document.getElementById('doneTitle').textContent=pct>=90?'Amazing! 🌟':pct>=70?'Brilliant! 🎉':pct>=50?'Good job! 👍':'Keep practising! 💪';
  soundWin();confetti();
}

function restart(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('pickScreen').style.display='block';
  document.getElementById('subtitle').textContent='Drop the word into the right vowel volcano!';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressLabel').textContent='';
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("../sw.js",{scope:"../"}).catch(()=>{});</script>
</body>
</html>
