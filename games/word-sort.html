<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Word Sort</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Comic Sans MS','Chalkboard SE','Arial Rounded MT Bold',sans-serif;
      background:linear-gradient(135deg,#fff1f2 0%,#fb7185 50%,#be123c 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 30px}
    .top-bar{width:100%;max-width:580px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .back-link{background:rgba(255,255,255,.85);border:none;border-radius:20px;padding:6px 14px;
      font-family:inherit;font-size:.85rem;font-weight:bold;color:#9f1239;cursor:pointer;text-decoration:none}
    .score-badge{background:rgba(255,255,255,.88);border-radius:14px;padding:6px 16px;
      font-size:.88rem;font-weight:bold;color:#555}
    .score-badge span{color:#be123c;font-size:1.05rem}
    h1{font-size:1.55rem;color:#fff;text-shadow:2px 2px 0 #881337;margin-bottom:4px;text-align:center}
    .subtitle{color:rgba(255,255,255,.9);font-size:.82rem;margin-bottom:10px;text-align:center;min-height:1.2em}
    .progress-wrap{width:100%;max-width:580px;margin-bottom:12px}
    .progress-track{height:9px;background:rgba(255,255,255,.35);border-radius:5px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#fda4af,#be123c);border-radius:5px;transition:width .4s ease;width:0%}
    .progress-label{font-size:.7rem;color:rgba(255,255,255,.85);text-align:right;margin-top:2px}
    .card{background:rgba(255,255,255,.97);border-radius:22px;padding:22px 18px 20px;
      box-shadow:0 8px 30px rgba(0,0,0,.13);width:100%;max-width:580px}

    /* Difficulty picker */
    #pickScreen{text-align:center}
    .pick-heading{font-size:1.1rem;font-weight:bold;color:#9f1239;margin-bottom:18px}
    .pick-btns{display:flex;flex-direction:column;gap:12px}
    .pick-btn{border:none;border-radius:16px;padding:16px 18px;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;gap:14px;text-align:left;transition:transform .12s ease}
    .pick-btn:hover{transform:translateY(-2px)}
    .pick-btn:active{transform:translateY(2px)}
    .pick-icon{font-size:1.8rem;line-height:1;flex-shrink:0}
    .pick-info{flex:1}
    .pick-name{font-size:1.05rem;font-weight:bold;display:block;margin-bottom:2px}
    .pick-desc{font-size:.75rem;opacity:.8;display:block}
    .btn-easy{background:linear-gradient(135deg,#d1fae5,#6ee7b7);color:#065f46;box-shadow:0 5px 0 #047857}
    .btn-medium{background:linear-gradient(135deg,#fff1f2,#fda4af);color:#9f1239;box-shadow:0 5px 0 #be123c}
    .btn-hard{background:linear-gradient(135deg,#fce7f3,#f9a8d4);color:#831843;box-shadow:0 5px 0 #be185d}

    /* Round header */
    .round-info{text-align:center;font-size:.78rem;color:#be123c;font-weight:bold;
      text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

    /* Family buckets at top */
    .buckets{display:flex;gap:10px;margin-bottom:16px;justify-content:center}
    .bucket{flex:1;max-width:200px;border-radius:14px;padding:12px 8px;text-align:center;
      border:3px solid transparent;min-height:70px}
    .bucket-label{font-size:1.3rem;font-weight:bold;display:block;letter-spacing:2px;margin-bottom:2px}
    .bucket-count{font-size:.7rem;font-weight:bold;opacity:.7;display:block}
    .bucket-a{background:linear-gradient(135deg,#dbeafe,#93c5fd);border-color:#3b82f6;color:#1e3a8a}
    .bucket-b{background:linear-gradient(135deg,#fef3c7,#fcd34d);border-color:#f59e0b;color:#78350f}
    .bucket-c{background:linear-gradient(135deg,#dcfce7,#86efac);border-color:#22c55e;color:#14532d}

    /* Current word */
    .word-card{text-align:center;margin-bottom:14px;background:linear-gradient(135deg,#fff1f2,#ffe4e6);
      border-radius:16px;padding:18px 12px;border:2px solid #fda4af}
    .word-emoji{font-size:3.5rem;display:block;line-height:1;margin-bottom:6px}
    .word-text{font-size:2.2rem;font-weight:bold;color:#1f2937;letter-spacing:4px}
    .word-counter{font-size:.7rem;color:#9ca3af;margin-top:4px}

    /* Sort buttons */
    .sort-btns{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
    .sort-btn{border:none;border-radius:14px;cursor:pointer;font-family:inherit;
      padding:14px 20px;font-size:1.1rem;font-weight:bold;letter-spacing:1px;
      transition:all .15s ease;min-width:80px}
    .sort-btn:hover{transform:translateY(-2px)}
    .sort-btn:active{transform:translateY(3px)}
    .sort-btn:disabled{cursor:default}
    .sbtn-a{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 5px 0 #1e3a8a}
    .sbtn-b{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 5px 0 #92400e}
    .sbtn-c{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 5px 0 #14532d}
    .sort-btn.correct{outline:4px solid #22c55e;animation:popIn .3s ease}
    .sort-btn.wrong{animation:shake .4s ease}
    @keyframes popIn{0%{transform:scale(.7)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}

    .status-msg{min-height:24px;text-align:center;font-size:.92rem;font-weight:bold;color:#be123c;margin-bottom:12px}
    .btn-next-wrap{text-align:center}
    .btn-next{background:linear-gradient(135deg,#be123c,#9f1239);color:#fff;border:none;
      border-radius:14px;padding:12px 30px;font-family:inherit;font-size:1rem;font-weight:bold;
      cursor:pointer;box-shadow:0 5px 0 #881337;transition:all .15s ease;display:none}
    .btn-next:hover{transform:translateY(-2px)}
    .btn-next:active{transform:translateY(3px);box-shadow:0 2px 0 #881337}

    /* Done screen */
    .done-screen{display:none;text-align:center}
    .done-emoji{font-size:4.5rem;display:block;margin-bottom:14px}
    .done-title{font-size:2rem;color:#9f1239;font-weight:bold;margin-bottom:8px}
    .done-score{font-size:1.1rem;color:#555;margin-bottom:6px}
    .done-level{font-size:.82rem;color:#6b7280;margin-bottom:20px}
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
    .confetti-piece{position:absolute;top:-20px;border-radius:2px;opacity:.85;animation:fall linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
  </style>
</head>
<body>
<div class="top-bar">
  <a class="back-link" href="../launcher.html">← All Games</a>
  <div class="score-badge">🗂️ <span id="score">0</span> pts</div>
</div>
<h1>🗂️ Word Sort</h1>
<p class="subtitle" id="subtitle">Sort each word into its word family!</p>
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div class="card" id="pickScreen">
  <div class="pick-heading">Choose your level</div>
  <div class="pick-btns">
    <button class="pick-btn btn-easy" onclick="startGame('easy')">
      <span class="pick-icon">⭐</span>
      <span class="pick-info">
        <span class="pick-name">Easy</span>
        <span class="pick-desc">CVC families: -AT vs -IG, -AN vs -OP…</span>
      </span>
    </button>
    <button class="pick-btn btn-medium" onclick="startGame('medium')">
      <span class="pick-icon">⭐⭐</span>
      <span class="pick-info">
        <span class="pick-name">Medium</span>
        <span class="pick-desc">Longer families: -AKE vs -INE vs -ING…</span>
      </span>
    </button>
    <button class="pick-btn btn-hard" onclick="startGame('hard')">
      <span class="pick-icon">⭐⭐⭐</span>
      <span class="pick-info">
        <span class="pick-name">Hard</span>
        <span class="pick-desc">Vowel teams: -IGHT vs -AIN vs -EAM…</span>
      </span>
    </button>
  </div>
</div>

<div class="card" id="gameCard" style="display:none">
  <div class="round-info" id="roundInfo">Round 1 · -AT vs -IG</div>
  <div class="buckets" id="buckets"></div>
  <div class="word-card">
    <span class="word-emoji" id="wordEmoji"></span>
    <div class="word-text" id="wordText"></div>
    <div class="word-counter" id="wordCounter"></div>
  </div>
  <div class="sort-btns" id="sortBtns"></div>
  <div class="status-msg" id="statusMsg"></div>
  <div class="btn-next-wrap">
    <button class="btn-next" id="btnNext" onclick="advance()">Next ➡</button>
  </div>
</div>

<div class="card done-screen" id="doneScreen">
  <span class="done-emoji">🗂️</span>
  <div class="done-title" id="doneTitle">Amazing!</div>
  <div class="done-score" id="doneScore"></div>
  <div class="done-level" id="doneLevel"></div>
  <button class="btn-next" style="display:inline-block" onclick="restart()">Play Again 🔄</button>
  <br><a class="back-link" style="margin-top:14px;display:inline-block" href="../launcher.html">← All Games</a>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="../data/word-sort.js"></script>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function getAC(){if(!ac&&AC)ac=new AC();return ac;}
function playTone(f,t,d,v=.18,del=0){try{const ctx=getAC();if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.value=f;const s=ctx.currentTime+del;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d);}catch(e){}}
function soundCorrect(){playTone(880,'sine',.12,.2);playTone(1100,'sine',.12,.18,.1);}
function soundWrong(){playTone(200,'sawtooth',.3,.12);}
function soundWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.25,.2,i*.12));}
function confetti(){const w=document.getElementById('confettiWrap');w.innerHTML='';const cols=['#be123c','#fb7185','#f59e0b','#22c55e','#3b82f6'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;background:${cols[0|Math.random()*cols.length]};animation-duration:${1.2+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px`;w.appendChild(p);}setTimeout(()=>w.innerHTML='',2200);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}

const SETTINGS={
  easy:  {tier:1, roundSets:[["-AT","-IG"],["-AN","-OP"],["-UN","-ET"]], label:'⭐ Easy'},
  medium:{tier:2, roundSets:[["-AKE","-INE"],["-OAT","-ING"],["-ARK","-AKE"]], label:'⭐⭐ Medium'},
  hard:  {tier:3, roundSets:[["-IGHT","-AIN"],["-EAM","-OWN"],["-ONG","-IGHT"]], label:'⭐⭐⭐ Hard'},
};
const BUCKET_STYLES=['bucket-a sbtn-a','bucket-b sbtn-b','bucket-c sbtn-c'];
const BTN_STYLES=['sbtn-a','sbtn-b','sbtn-c'];

let difficulty='easy',score=0;
let roundSets=[],currentSetIdx=0,roundWords=[],wordIdx=0,bucketCounts={};

function startGame(diff){
  difficulty=diff;
  const s=SETTINGS[diff];
  roundSets=s.roundSets;
  currentSetIdx=0;score=0;
  document.getElementById('score').textContent='0';
  document.getElementById('pickScreen').style.display='none';
  document.getElementById('gameCard').style.display='block';
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('subtitle').textContent=`${s.label} — Sort by family!`;
  startRound();
}

function startRound(){
  if(currentSetIdx>=roundSets.length){showDone();return;}
  const families=roundSets[currentSetIdx];
  bucketCounts={};
  families.forEach(f=>bucketCounts[f]=0);

  // Get words for these families
  const tier=SETTINGS[difficulty].tier;
  const allWords=window.WORD_SORT.filter(w=>(w.tier??1)===tier&&families.includes(w.family));
  // Pick 3 per family, shuffle together
  const perFamily=3;
  roundWords=shuffle(families.flatMap(f=>shuffle(allWords.filter(w=>w.family===f)).slice(0,perFamily)));
  wordIdx=0;

  updateProgress();
  renderBuckets(families);
  showWord();
}

function renderBuckets(families){
  const el=document.getElementById('buckets');
  el.innerHTML='';
  families.forEach((f,i)=>{
    const div=document.createElement('div');
    const [bc]=BUCKET_STYLES[i].split(' ');
    div.className=`bucket ${bc}`;
    div.id=`bucket-${f}`;
    div.innerHTML=`<span class="bucket-label">${f}</span><span class="bucket-count" id="bcount-${f}">0 words</span>`;
    el.appendChild(div);
  });

  const sb=document.getElementById('sortBtns');
  sb.innerHTML='';
  families.forEach((f,i)=>{
    const btn=document.createElement('button');
    btn.className=`sort-btn ${BTN_STYLES[i]}`;
    btn.id=`sbtn-${f}`;
    btn.textContent=f;
    btn.onclick=()=>sortWord(btn,f);
    sb.appendChild(btn);
  });

  const families_str=families.join(' vs ');
  document.getElementById('roundInfo').textContent=`Round ${currentSetIdx+1} of ${roundSets.length} · ${families_str}`;
}

function showWord(){
  if(wordIdx>=roundWords.length){
    // Round done
    currentSetIdx++;
    setTimeout(()=>startRound(),400);
    return;
  }
  const w=roundWords[wordIdx];
  document.getElementById('wordEmoji').textContent=w.emoji;
  document.getElementById('wordText').textContent=w.word;
  document.getElementById('wordCounter').textContent=`Word ${wordIdx+1} of ${roundWords.length}`;
  document.getElementById('statusMsg').textContent='';
  document.getElementById('btnNext').style.display='none';
  document.querySelectorAll('.sort-btn').forEach(b=>{b.disabled=false;b.classList.remove('correct','wrong');});
}

function updateProgress(){
  const totalRounds=roundSets.length;
  const prog=currentSetIdx/totalRounds;
  document.getElementById('progressFill').style.width=Math.round(prog*100)+'%';
  document.getElementById('progressLabel').textContent=`Round ${currentSetIdx+1} of ${totalRounds}`;
}

function sortWord(btn,family){
  document.querySelectorAll('.sort-btn').forEach(b=>b.disabled=true);
  const w=roundWords[wordIdx];
  const correct=family===w.family;
  if(correct){
    btn.classList.add('correct');
    score+=10;
    document.getElementById('score').textContent=score;
    bucketCounts[family]=(bucketCounts[family]||0)+1;
    document.getElementById(`bcount-${family}`).textContent=`${bucketCounts[family]} word${bucketCounts[family]>1?'s':''}`;
    document.getElementById('statusMsg').textContent=`✅ ${w.word} belongs to ${w.family}!`;
    soundCorrect();
    setTimeout(()=>{wordIdx++;showWord();},800);
  }else{
    btn.classList.add('wrong');
    document.getElementById(`sbtn-${w.family}`).classList.add('correct');
    document.getElementById('statusMsg').textContent=`❌ ${w.word} belongs to ${w.family}`;
    soundWrong();
    setTimeout(()=>{
      document.querySelectorAll('.sort-btn').forEach(b=>{b.disabled=false;b.classList.remove('correct','wrong');});
      document.getElementById('statusMsg').textContent='';
    },900);
  }
}

function advance(){document.getElementById('btnNext').style.display='none';}

function showDone(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='block';
  document.getElementById('progressFill').style.width='100%';
  const total=roundSets.length*6;
  const pct=Math.round(score/total/10*100);
  document.getElementById('doneScore').textContent=`You scored ${score} out of ${total*10} points (${pct}%)!`;
  document.getElementById('doneLevel').textContent=`Level: ${SETTINGS[difficulty].label}`;
  document.getElementById('doneTitle').textContent=pct>=90?'Amazing! 🌟':pct>=70?'Brilliant! 🎉':pct>=50?'Good job! 👍':'Keep practising! 💪';
  soundWin();confetti();
}

function restart(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='none';
  document.getElementById('pickScreen').style.display='block';
  document.getElementById('subtitle').textContent='Sort each word into its word family!';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressLabel').textContent='';
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("../sw.js",{scope:"../"}).catch(()=>{});</script>
</body>
</html>
