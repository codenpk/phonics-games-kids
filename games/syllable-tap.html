<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Syllable Tap</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Comic Sans MS','Chalkboard SE','Arial Rounded MT Bold',sans-serif;
      background:linear-gradient(135deg,#d1fae5 0%,#34d399 50%,#059669 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 30px}
    .top-bar{width:100%;max-width:580px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .back-link{background:rgba(255,255,255,.85);border:none;border-radius:20px;padding:6px 14px;
      font-family:inherit;font-size:.85rem;font-weight:bold;color:#065f46;cursor:pointer;text-decoration:none}
    .score-badge{background:rgba(255,255,255,.88);border-radius:14px;padding:6px 16px;
      font-size:.88rem;font-weight:bold;color:#555}
    .score-badge span{color:#059669;font-size:1.05rem}
    h1{font-size:1.6rem;color:#fff;text-shadow:2px 2px 0 #065f46;margin-bottom:4px;letter-spacing:1px;text-align:center}
    .subtitle{color:rgba(255,255,255,.9);font-size:.82rem;margin-bottom:10px;text-align:center}
    .progress-wrap{width:100%;max-width:580px;margin-bottom:12px}
    .progress-track{height:9px;background:rgba(255,255,255,.35);border-radius:5px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#6ee7b7,#059669);border-radius:5px;transition:width .4s ease;width:0%}
    .progress-label{font-size:.7rem;color:rgba(255,255,255,.85);text-align:right;margin-top:2px}
    .card{background:rgba(255,255,255,.97);border-radius:22px;padding:22px 18px 20px;
      box-shadow:0 8px 30px rgba(0,0,0,.13);width:100%;max-width:580px}

    .prompt{text-align:center;font-size:.8rem;font-weight:bold;color:#059669;
      text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .word-display{text-align:center;margin-bottom:24px}
    .word-emoji{font-size:4rem;display:block;line-height:1;margin-bottom:8px}
    .word-text{font-size:1.8rem;font-weight:bold;color:#1f2937;letter-spacing:3px}
    .word-split{font-size:1.1rem;color:#059669;font-weight:bold;letter-spacing:2px;
      min-height:26px;margin-top:6px;transition:opacity .3s ease;opacity:0}
    .word-split.visible{opacity:1}

    .tap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .tap-btn{border-radius:16px;border:none;cursor:pointer;font-family:inherit;
      background:linear-gradient(135deg,#059669,#047857);color:#fff;
      box-shadow:0 5px 0 #065f46;transition:all .15s ease;padding:18px 6px;text-align:center}
    .tap-btn:hover{transform:translateY(-2px)}
    .tap-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #065f46}
    .tap-num{font-size:1.8rem;font-weight:bold;display:block;line-height:1;margin-bottom:2px}
    .tap-label{font-size:.65rem;color:rgba(255,255,255,.8)}
    .tap-btn.correct{background:linear-gradient(135deg,#56ab2f,#38a169)!important;box-shadow:0 5px 0 #1c4532!important;cursor:default}
    .tap-btn.wrong{background:linear-gradient(135deg,#e53e3e,#c53030)!important;box-shadow:0 5px 0 #9b2c2c!important;cursor:default}
    .tap-btn:disabled{cursor:default}

    .status-msg{min-height:26px;text-align:center;font-size:.92rem;font-weight:bold;color:#065f46;margin-bottom:12px}
    .btn-next-wrap{text-align:center}
    .btn-next{background:linear-gradient(135deg,#f953c6,#b91d73);color:#fff;border:none;
      border-radius:14px;padding:12px 30px;font-family:inherit;font-size:1rem;font-weight:bold;
      cursor:pointer;box-shadow:0 5px 0 #8a0050;transition:all .15s ease;display:none}
    .btn-next:hover{transform:translateY(-2px)}
    .btn-next:active{transform:translateY(3px);box-shadow:0 2px 0 #8a0050}

    .done-screen{display:none;text-align:center}
    .done-emoji{font-size:4.5rem;display:block;margin-bottom:14px}
    .done-title{font-size:2rem;color:#065f46;font-weight:bold;margin-bottom:8px}
    .done-score{font-size:1.1rem;color:#555;margin-bottom:20px}
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
    .confetti-piece{position:absolute;top:-20px;border-radius:2px;opacity:.85;animation:fall linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
  </style>
</head>
<body>
<div class="top-bar">
  <a class="back-link" href="../launcher.html">← All Games</a>
  <div class="score-badge">⭐ <span id="score">0</span> pts</div>
</div>
<h1>👏 Syllable Tap</h1>
<p class="subtitle">Clap and count the syllables!</p>
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Word 1 of ?</div>
</div>

<div class="card" id="gameCard">
  <div class="prompt">How many syllables?</div>
  <div class="word-display">
    <span class="word-emoji" id="wordEmoji"></span>
    <div class="word-text" id="wordText"></div>
    <div class="word-split" id="wordSplit"></div>
  </div>
  <div class="tap-grid" id="tapGrid"></div>
  <div class="status-msg" id="statusMsg"></div>
  <div class="btn-next-wrap">
    <button class="btn-next" id="btnNext" onclick="nextQ()">Next ➡</button>
  </div>
</div>

<div class="card done-screen" id="doneScreen">
  <span class="done-emoji">🎉</span>
  <div class="done-title">Superstar!</div>
  <div class="done-score" id="doneScore"></div>
  <button class="btn-next" style="display:inline-block" onclick="restart()">Play Again 🔄</button>
  <br><a class="back-link" style="margin-top:14px;display:inline-block" href="../launcher.html">← All Games</a>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="../data/syllables.js"></script>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function getAC(){if(!ac&&AC)ac=new AC();return ac;}
function playTone(f,t,d,v=.18,del=0){try{const ctx=getAC();if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.value=f;const s=ctx.currentTime+del;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d);}catch(e){}}
function soundClap(n){for(let i=0;i<n;i++)playTone(300+i*30,'square',.08,.15,i*.18);}
function soundCorrect(){playTone(880,'sine',.15,.2);playTone(1100,'sine',.15,.18,.1);}
function soundWrong(){playTone(200,'sawtooth',.3,.12);}
function soundWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.25,.2,i*.12));}
function confetti(){const w=document.getElementById('confettiWrap');w.innerHTML='';const cols=['#059669','#f953c6','#2563eb','#f59e0b','#7c3aed'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;background:${cols[0|Math.random()*cols.length]};animation-duration:${1.2+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px`;w.appendChild(p);}setTimeout(()=>w.innerHTML='',2200);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}

const LABELS=['','syllable','syllables','syllables','syllables'];
let questions=[],qi=0,score=0;

function start(){
  questions=shuffle([...window.SYLLABLES]);
  qi=0;score=0;
  document.getElementById('score').textContent='0';
  document.getElementById('gameCard').style.display='';
  document.getElementById('doneScreen').style.display='none';
  showQ();
}

function showQ(){
  const q=questions[qi];
  document.getElementById('progressFill').style.width=Math.round(qi/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent=`Word ${qi+1} of ${questions.length}`;
  document.getElementById('wordEmoji').textContent=q.emoji;
  document.getElementById('wordText').textContent=q.word;
  const splitEl=document.getElementById('wordSplit');
  splitEl.textContent='';
  splitEl.classList.remove('visible');
  document.getElementById('statusMsg').textContent='';
  document.getElementById('btnNext').style.display='none';

  const grid=document.getElementById('tapGrid');
  grid.innerHTML='';
  [1,2,3,4].forEach(n=>{
    const btn=document.createElement('button');
    btn.className='tap-btn';
    btn.innerHTML=`<span class="tap-num">${n}</span><span class="tap-label">${LABELS[n]}</span>`;
    btn.onclick=()=>choose(btn,n,q);
    grid.appendChild(btn);
  });
}

function choose(btn,n,q){
  document.querySelectorAll('.tap-btn').forEach(b=>b.disabled=true);
  const correct=n===q.syllables;
  const splitEl=document.getElementById('wordSplit');

  if(correct){
    btn.classList.add('correct');
    score+=10;
    document.getElementById('score').textContent=score;
    document.getElementById('statusMsg').textContent=`✅ ${q.syllables} ${LABELS[q.syllables]}!`;
    soundClap(q.syllables);
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.tap-btn').forEach(b=>{
      if(parseInt(b.querySelector('.tap-num').textContent)===q.syllables)b.classList.add('correct');
    });
    document.getElementById('statusMsg').textContent=`❌ ${q.word} has ${q.syllables} ${LABELS[q.syllables]}`;
    soundWrong();
  }
  // Always reveal syllable split
  splitEl.textContent=q.split;
  setTimeout(()=>splitEl.classList.add('visible'),100);
  setTimeout(()=>document.getElementById('btnNext').style.display='inline-block',900);
}

function nextQ(){qi++;if(qi>=questions.length)showDone();else showQ();}

function showDone(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('doneScore').textContent=`You scored ${score} out of ${questions.length*10} points!`;
  soundWin();confetti();
}
function restart(){start();}
window.addEventListener('load',start);
</script>
</body>
</html>
