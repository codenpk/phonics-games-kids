<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sight Word Flash</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Comic Sans MS','Chalkboard SE','Arial Rounded MT Bold',sans-serif;
      background:linear-gradient(135deg,#dbeafe 0%,#60a5fa 50%,#1d4ed8 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 30px}
    .top-bar{width:100%;max-width:580px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .back-link{background:rgba(255,255,255,.85);border:none;border-radius:20px;padding:6px 14px;
      font-family:inherit;font-size:.85rem;font-weight:bold;color:#1e40af;cursor:pointer;text-decoration:none}
    .score-badge{background:rgba(255,255,255,.88);border-radius:14px;padding:6px 16px;
      font-size:.88rem;font-weight:bold;color:#555}
    .score-badge span{color:#2563eb;font-size:1.05rem}
    h1{font-size:1.6rem;color:#fff;text-shadow:2px 2px 0 #1e40af;margin-bottom:4px;letter-spacing:1px;text-align:center}
    .subtitle{color:rgba(255,255,255,.9);font-size:.82rem;margin-bottom:10px;text-align:center}
    .progress-wrap{width:100%;max-width:580px;margin-bottom:12px}
    .progress-track{height:9px;background:rgba(255,255,255,.35);border-radius:5px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#93c5fd,#2563eb);border-radius:5px;transition:width .4s ease;width:0%}
    .progress-label{font-size:.7rem;color:rgba(255,255,255,.85);text-align:right;margin-top:2px}
    .card{background:rgba(255,255,255,.97);border-radius:22px;padding:22px 18px 20px;
      box-shadow:0 8px 30px rgba(0,0,0,.13);width:100%;max-width:580px}

    /* ── Flash state ── */
    #flashState{text-align:center}
    .flash-prompt{font-size:.78rem;font-weight:bold;color:#2563eb;text-transform:uppercase;
      letter-spacing:1px;margin-bottom:14px}
    .flash-word{font-size:3.2rem;font-weight:bold;color:#1e3a8a;letter-spacing:6px;
      margin-bottom:20px;min-height:60px;transition:opacity .3s ease}
    .flash-word.hidden{opacity:0}
    .countdown-track{height:8px;background:#dbeafe;border-radius:4px;overflow:hidden;margin-bottom:8px}
    .countdown-bar{height:100%;background:linear-gradient(90deg,#2563eb,#1d4ed8);
      border-radius:4px;width:100%;transition:none}
    .countdown-label{font-size:.7rem;color:#93c5fd;text-align:center}

    /* ── Choose state ── */
    #chooseState{display:none;text-align:center}
    .choose-prompt{font-size:.88rem;font-weight:bold;color:#2563eb;text-transform:uppercase;
      letter-spacing:1px;margin-bottom:16px}
    .word-choices{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
    .word-btn{border-radius:14px;border:none;cursor:pointer;font-family:inherit;
      font-size:1.3rem;font-weight:bold;letter-spacing:3px;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;
      box-shadow:0 5px 0 #1e3a8a;transition:all .15s ease;padding:16px}
    .word-btn:hover{transform:translateY(-2px)}
    .word-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #1e3a8a}
    .word-btn.correct{background:linear-gradient(135deg,#56ab2f,#38a169)!important;box-shadow:0 5px 0 #1c4532!important;cursor:default}
    .word-btn.wrong{background:linear-gradient(135deg,#e53e3e,#c53030)!important;box-shadow:0 5px 0 #9b2c2c!important;cursor:default}
    .word-btn:disabled{cursor:default}

    .status-msg{min-height:26px;text-align:center;font-size:.95rem;font-weight:bold;color:#1e40af;margin-bottom:12px}
    .btn-next-wrap{text-align:center}
    .btn-next{background:linear-gradient(135deg,#f953c6,#b91d73);color:#fff;border:none;
      border-radius:14px;padding:12px 30px;font-family:inherit;font-size:1rem;font-weight:bold;
      cursor:pointer;box-shadow:0 5px 0 #8a0050;transition:all .15s ease;display:none}
    .btn-next:hover{transform:translateY(-2px)}
    .btn-next:active{transform:translateY(3px);box-shadow:0 2px 0 #8a0050}

    .done-screen{display:none;text-align:center}
    .done-emoji{font-size:4.5rem;display:block;margin-bottom:14px}
    .done-title{font-size:2rem;color:#1d4ed8;font-weight:bold;margin-bottom:8px}
    .done-score{font-size:1.1rem;color:#555;margin-bottom:20px}
    .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
    .confetti-piece{position:absolute;top:-20px;border-radius:2px;opacity:.85;animation:fall linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
  </style>
</head>
<body>
<div class="top-bar">
  <a class="back-link" href="../launcher.html">← All Games</a>
  <div class="score-badge">⭐ <span id="score">0</span> pts</div>
</div>
<h1>👁️ Sight Word Flash</h1>
<p class="subtitle">Look carefully — then find the word!</p>
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Word 1 of ?</div>
</div>

<div class="card" id="gameCard">
  <!-- Flash state: show word briefly -->
  <div id="flashState">
    <div class="flash-prompt">Remember this word...</div>
    <div class="flash-word" id="flashWord"></div>
    <div class="countdown-track">
      <div class="countdown-bar" id="countdownBar"></div>
    </div>
    <div class="countdown-label" id="countdownLabel">Get ready...</div>
  </div>

  <!-- Choose state: pick which word you saw -->
  <div id="chooseState">
    <div class="choose-prompt">Which word did you see?</div>
    <div class="word-choices" id="wordChoices"></div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="btn-next-wrap">
      <button class="btn-next" id="btnNext" onclick="nextQ()">Next ➡</button>
    </div>
  </div>
</div>

<div class="card done-screen" id="doneScreen">
  <span class="done-emoji">🎉</span>
  <div class="done-title">Brilliant!</div>
  <div class="done-score" id="doneScore"></div>
  <button class="btn-next" style="display:inline-block" onclick="restart()">Play Again 🔄</button>
  <br><a class="back-link" style="margin-top:14px;display:inline-block" href="../launcher.html">← All Games</a>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="../data/sight-words.js"></script>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function getAC(){if(!ac&&AC)ac=new AC();return ac;}
function playTone(f,t,d,v=.18,del=0){try{const ctx=getAC();if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.value=f;const s=ctx.currentTime+del;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d);}catch(e){}}
function soundCorrect(){playTone(880,'sine',.15,.2);playTone(1100,'sine',.15,.18,.1);}
function soundWrong(){playTone(200,'sawtooth',.3,.12);}
function soundWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.25,.2,i*.12));}
function confetti(){const w=document.getElementById('confettiWrap');w.innerHTML='';const cols=['#2563eb','#f953c6','#38a169','#f59e0b','#7c3aed'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;background:${cols[0|Math.random()*cols.length]};animation-duration:${1.2+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;width:${8+Math.random()*8}px;height:${10+Math.random()*10}px`;w.appendChild(p);}setTimeout(()=>w.innerHTML='',2200);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}

const FLASH_MS=2000;
let questions=[],qi=0,score=0,flashTimer=null,countdownTimer=null;

function start(){
  questions=shuffle([...window.SIGHT_WORDS]);
  qi=0;score=0;
  document.getElementById('score').textContent='0';
  document.getElementById('gameCard').style.display='';
  document.getElementById('doneScreen').style.display='none';
  showQ();
}

function showQ(){
  const q=questions[qi];
  document.getElementById('progressFill').style.width=Math.round(qi/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent=`Word ${qi+1} of ${questions.length}`;

  // Reset to flash state
  document.getElementById('flashState').style.display='';
  document.getElementById('chooseState').style.display='none';
  document.getElementById('statusMsg').textContent='';
  document.getElementById('btnNext').style.display='none';

  const wordEl=document.getElementById('flashWord');
  wordEl.textContent=q.word;
  wordEl.classList.remove('hidden');

  // Animate countdown bar
  const bar=document.getElementById('countdownBar');
  bar.style.transition='none';
  bar.style.width='100%';
  document.getElementById('countdownLabel').textContent='Look carefully!';

  // Force reflow so transition reset takes effect
  bar.getBoundingClientRect();
  bar.style.transition=`width ${FLASH_MS}ms linear`;
  bar.style.width='0%';

  // After flash duration, fade word and show choices
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>{
    wordEl.classList.add('hidden');
    document.getElementById('countdownLabel').textContent='';
    setTimeout(()=>showChoices(q),300);
  }, FLASH_MS);
}

function showChoices(q){
  document.getElementById('flashState').style.display='none';
  document.getElementById('chooseState').style.display='';

  const opts=shuffle([q.word,...q.distractors]);
  const el=document.getElementById('wordChoices');
  el.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='word-btn';
    btn.textContent=opt;
    btn.onclick=()=>choose(btn,opt,q);
    el.appendChild(btn);
  });
}

function choose(btn,opt,q){
  document.querySelectorAll('.word-btn').forEach(b=>b.disabled=true);
  if(opt===q.word){
    btn.classList.add('correct');
    score+=10;
    document.getElementById('score').textContent=score;
    document.getElementById('statusMsg').textContent=`✅ "${q.word}" — well spotted!`;
    soundCorrect();
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.word-btn').forEach(b=>{if(b.textContent===q.word)b.classList.add('correct');});
    document.getElementById('statusMsg').textContent=`❌ The word was "${q.word}"`;
    soundWrong();
  }
  setTimeout(()=>document.getElementById('btnNext').style.display='inline-block',900);
}

function nextQ(){qi++;if(qi>=questions.length)showDone();else showQ();}

function showDone(){
  document.getElementById('gameCard').style.display='none';
  document.getElementById('doneScreen').style.display='';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('doneScore').textContent=`You scored ${score} out of ${questions.length*10} points!`;
  soundWin();confetti();
}
function restart(){start();}
window.addEventListener('load',start);
</script>
</body>
</html>
